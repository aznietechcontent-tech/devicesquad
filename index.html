<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Device Squad - Portal Info Gadget Terkini</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-slate-900 text-slate-100 font-sans min-h-screen flex flex-col justify-between">

  <!-- NAVIGATION BAR -->
  <nav class="bg-slate-800 border-b border-slate-700/60 p-4 shadow-lg sticky top-0 z-45">
    <div class="container mx-auto flex justify-between items-center">
       <div class="flex items-center gap-3">
        <img src="devicesquad.jpeg" alt="Logo Device Squad" class="h-8 w-8 rounded-lg object-cover shadow-md shadow-cyan-500/10 border border-slate-700/50">
        <h1 class="text-xl font-black tracking-tight text-white uppercase leading-none">Device <span class="text-cyan-400">Squad</span></h1>
      </div>
      <div class="flex items-center gap-4">
        <span class="flex h-2 w-2 relative">
          <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
          <span class="relative inline-flex rounded-full h-2 w-2 bg-emerald-500"></span>
        </span>
        <span class="text-xs font-semibold text-slate-400 uppercase tracking-widest bg-slate-900/60 px-3 py-1.5 rounded-lg border border-slate-700">Live</span>
      </div>
    </div>
  </nav>

  <!-- MAIN HEADER & SEARCH BAR -->
  <main class="container mx-auto px-4 my-8 flex-grow max-w-6xl">
    
    <div class="bg-slate-800 border border-slate-700/50 rounded-2xl p-5 shadow-xl mb-8 flex flex-col md:flex-row gap-4 justify-between items-center">
      <!-- Navigasi Filter Kategori -->
      <div id="category-filters" class="flex flex-wrap gap-2 w-full md:w-auto">
        <button id="btn-semua" onclick="filterCategory('semua')" class="text-xs font-bold px-4 py-2.5 rounded-xl transition cursor-pointer bg-cyan-500 text-slate-900 shadow-md shadow-cyan-500/20">
          Semua
        </button>
        <button id="btn-Gadget" onclick="filterCategory('Gadget')" class="text-xs font-bold px-4 py-2.5 rounded-xl transition cursor-pointer bg-slate-700 text-slate-300 hover:bg-slate-600">
          Gadget
        </button>
        <button id="btn-Software" disabled class="text-xs font-bold px-4 py-2.5 rounded-xl bg-slate-800 text-slate-600 border border-slate-700/30 opacity-50 cursor-not-allowed">
          Software
        </button>
        <button id="btn-AIFuture" disabled class="text-xs font-bold px-4 py-2.5 rounded-xl bg-slate-800 text-slate-600 border border-slate-700/30 opacity-50 cursor-not-allowed">
          AI & Future
        </button>
        <button id="btn-Cybersecurity" disabled class="text-xs font-bold px-4 py-2.5 rounded-xl bg-slate-800 text-slate-600 border border-slate-700/30 opacity-50 cursor-not-allowed">
          Cybersecurity
        </button>
        <button id="btn-Game" disabled class="text-xs font-bold px-4 py-2.5 rounded-xl bg-slate-800 text-slate-600 border border-slate-700/30 opacity-50 cursor-not-allowed">
          Game
        </button>
      </div>

      <!-- Kotak Pencarian -->
      <div class="relative w-full md:w-72">
        <input type="text" id="search-input" oninput="handleSearch()" class="w-full bg-slate-900 border border-slate-700 rounded-xl pl-4 pr-10 py-2.5 text-sm text-white placeholder-slate-500 focus:outline-none focus:border-cyan-500 transition shadow-inner" placeholder="Cari info gadget...">
        <span class="absolute right-3.5 top-3 text-slate-500 text-xs">🔍</span>
      </div>
    </div>

    <!-- WRAPPER UTAMA DATA BERITA -->
    <div>
      <!-- Status Loading / Pesan Error -->
      <div id="loading-status" class="text-center py-20 bg-slate-800/30 border border-dashed border-slate-700 rounded-2xl shadow-inner">
        <div class="inline-block animate-spin rounded-full h-8 w-8 border-4 border-cyan-500 border-t-transparent mb-4"></div>
        <p class="text-slate-400 text-sm font-medium tracking-wide">Menghubungkan ke database Device Squad & memuat artikel...</p>
      </div>

      <!-- Grid Tempat Kartu Artikel Muncul -->
      <div id="articles-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 hidden">
        <!-- Disuntikkan secara dinamis melalui JavaScript -->
      </div>

      <!-- Tombol Load More -->
      <div id="load-more-container" class="text-center mt-10 hidden">
        <button onclick="loadMore()" class="bg-slate-800 hover:bg-slate-750 border border-slate-700 text-slate-200 px-6 py-3 rounded-xl text-sm font-bold shadow-md hover:border-slate-600 transition cursor-pointer">
          Muat Berita Lainnya 👇
        </button>
      </div>
    </div>

  </main>

  <!-- FOOTER -->
  <footer class="bg-slate-950 border-t border-slate-800 py-6 text-center text-xs text-slate-600 tracking-wide mt-12">
    <div class="container mx-auto px-4">
      <p>&copy; 2026 <span class="text-slate-400 font-bold">Device Squad</span>. Ditenagai oleh Google Sheets API & GitHub Pages.</p>
    </div>
  </footer>

  <!-- MODAL BACA SELENGKAPNYA -->
 <div id="article-modal" class="fixed inset-0 bg-slate-950/80 backdrop-blur-sm z-50 flex items-center justify-center p-4 hidden" onclick="closeModal()">
    <div class="bg-slate-800 border border-slate-700 rounded-2xl max-w-2xl w-full max-h-[90vh] overflow-hidden flex flex-col shadow-2xl" onclick="event.stopPropagation()">
      
      <div class="relative bg-slate-950 flex items-center justify-center overflow-hidden h-[380px] shrink-0 border-b border-slate-700/50">
        <img id="modal-img-blur" class="absolute inset-0 w-full h-full object-cover opacity-15 blur-2xl scale-110 pointer-events-none" src="">
        
        <img id="modal-img" class="w-auto h-full max-w-full object-contain relative z-10 p-2" src="" alt="Cover">
        
        <button onclick="closeModal()" class="absolute top-4 right-4 bg-slate-900/80 hover:bg-slate-950 text-white font-bold h-9 w-9 rounded-full flex items-center justify-center shadow-lg transition cursor-pointer z-20 border border-slate-700/40">✕</button>
      </div>

      <div class="p-6 overflow-y-auto flex-grow">
        <div class="flex items-center gap-3 mb-4">
          <span id="modal-category" class="text-xs font-bold bg-cyan-950 text-cyan-400 px-2.5 py-1 rounded-md border border-cyan-900/50"></span>
          <span id="modal-date" class="text-xs text-slate-500"></span>
        </div>
        
        <h2 id="modal-title" class="text-xl md:text-2xl font-extrabold text-white leading-snug mb-4"></h2>
        
        <div class="border-b border-slate-700/60 my-4"></div>
        
        <div id="modal-content" class="text-slate-300 text-sm leading-relaxed space-y-4 whitespace-pre-line">
          </div>

        <div class="mt-8 pt-4 border-t border-slate-700/60 flex justify-end">
          <a id="modal-source-link" href="#" target="_blank" class="text-xs bg-slate-900 border border-slate-700 text-cyan-400 hover:text-cyan-300 px-4 py-2.5 rounded-xl font-semibold shadow-md transition hidden">
            Kunjungi Sumber Berita Asli 🌐
          </a>
        </div>
      </div>

    </div>
  </div>

  <!-- CORE JAVASCRIPT ENGINE -->
  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbwoV3Kxwrv1zama2ljWB8SWiv-3w5fjHp52_9FFDarEo4Ssh7HCzOlOoK60QMFejVNv/exec";
    
    let globalArticles = [];      
    let currentCategory = "semua"; 
    let searchQuery = "";         
    
    const ITEMS_PER_PAGE = 6;      
    let currentLimit = ITEMS_PER_PAGE; 

    // 1. Ambil Data dari API
    async function loadArticles() {
      const loadingElement = document.getElementById('loading-status');
      const gridElement = document.getElementById('articles-grid');
      
      try {
        console.log("Memulai koneksi database...");
        const response = await fetch(API_URL);
        
        if (!response.ok) {
          throw new Error(`HTTP error! status: ${response.status}`);
        }
        
        globalArticles = await response.json();
        console.log("Data diterima:", globalArticles);

        if (loadingElement) loadingElement.classList.add('hidden');
        if (gridElement) gridElement.classList.remove('hidden');
        
        applyFilterAndSearch(); 

      } catch (error) {
        console.error("Koneksi gagal:", error);
        if (loadingElement) {
          loadingElement.innerHTML = `
            <p class="text-red-400 font-bold text-base">Gagal memuat basis data Device Squad.</p>
            <p class="text-xs text-slate-500 mt-2 bg-slate-900/60 py-2 px-4 inline-block rounded-lg border border-slate-700/40">Sebab: ${error.message}</p>
            <br>
            <button onclick="loadArticles()" class="mt-4 bg-slate-700 text-xs font-semibold px-4 py-2.5 rounded-xl text-cyan-400 hover:bg-slate-600 transition cursor-pointer">Coba Hubungkan Ulang</button>
          `;
        }
      }
    }

    // 2. Pemrosesan Filter, Search, dan Batasan Tampilan (Pagination)
    function applyFilterAndSearch() {
      const gridElement = document.getElementById('articles-grid');
      const loadMoreContainer = document.getElementById('load-more-container');
      
      if (!gridElement) return;
      gridElement.innerHTML = ""; // Bersihkan isi grid lama

      // --- LOGIKA MESIN PENYARING YANG HILANG SEBELUMNYA ---
      let filtered = globalArticles.filter(art => {
        const matchCategory = (currentCategory === "semua") || 
                              (art.kategori && art.kategori.toLowerCase() === currentCategory.toLowerCase());
        
        const textSearch = searchQuery.toLowerCase();
        const matchSearch = !searchQuery || 
                            (art.judul && art.judul.toLowerCase().includes(textSearch)) || 
                            (art.konten && art.konten.toLowerCase().includes(textSearch));
        
        return matchCategory && matchSearch;
      });

      // Potong total item sesuai limit halaman (Pagination)
      const itemsToRender = filtered.slice(0, currentLimit);

      // Tampilkan status jika pencarian kosong
      if (itemsToRender.length === 0) {
        gridElement.innerHTML = `
          <div class="col-span-full text-center py-12 bg-slate-800/20 border border-slate-700/40 rounded-2xl">
            <p class="text-slate-400 text-sm">Tidak ada artikel gadget yang cocok ditemukan.</p>
          </div>
        `;
        if (loadMoreContainer) loadMoreContainer.classList.add('hidden');
        return;
      }

      // Loop rendering kartu HTML kustom stabil
      itemsToRender.forEach((art) => {
        const originalIndex = globalArticles.findIndex(a => a.id === art.id);
        const fallbackImg = 'https://images.unsplash.com/photo-1518770660439-4636190af475?w=500';
        const kontenBersih = (art.konten || "").replace(/<\/?[^>]+(>|$)/g, "");

        const cardHTML = `
          <div class="bg-slate-800 rounded-2xl overflow-hidden shadow-md border border-slate-700/40 flex flex-col justify-between h-full transition duration-300 hover:-translate-y-1 hover:shadow-cyan-500/5 hover:border-slate-600">
            
            <div class="flex flex-col flex-grow">
              <!-- Pembungkus Gambar Fleksibel Rasio 4:5 Instagram -->
              <div class="w-full h-72 bg-slate-950 flex items-center justify-center overflow-hidden relative border-b border-slate-700/30">
                <img class="absolute inset-0 w-full h-full object-cover opacity-15 blur-md" src="${art.gambar || fallbackImg}">
                <img class="max-w-full max-h-full object-contain relative z-10" src="${art.gambar || fallbackImg}" alt="Cover">
              </div>
              
              <div class="p-5 flex-grow">
                <span class="text-xs font-semibold bg-cyan-950/80 text-cyan-400 px-2.5 py-1 rounded-md border border-cyan-800/30">
                  ${art.kategori || 'Gadget'}
                </span>
                <h2 class="text-base font-bold mt-3 text-white line-clamp-2 leading-snug">
                  ${art.judul || 'Tanpa Judul'}
                </h2>
                <p class="text-slate-400 text-xs mt-2 line-clamp-3 leading-relaxed">
                  ${kontenBersih}
                </p>
              </div>
            </div>
            
            <div class="p-5 pt-0 border-t border-slate-700/20 mt-auto flex justify-between items-center h-14">
              <span class="text-[11px] text-slate-500 font-medium">${art.tanggal || ''}</span>
              <button onclick="openModal(${originalIndex})" class="text-xs font-bold text-cyan-400 hover:text-cyan-300 transition flex items-center gap-1 cursor-pointer">
                Baca Selengkapnya &rarr;
              </button>
            </div>

          </div>
        `;
        gridElement.innerHTML += cardHTML;
      });

      // Atur tombol Load More otomatis muncul/sembunyi
      if (loadMoreContainer) {
        if (filtered.length > currentLimit) {
          loadMoreContainer.classList.remove('hidden');
        } else {
          loadMoreContainer.classList.add('hidden');
        }
      }
    }

    function loadMore() {
      currentLimit += ITEMS_PER_PAGE; 
      applyFilterAndSearch();          
    }

    // 3. Efek Visual Tombol Kategori Aktif
    function filterCategory(category) {
      currentLimit = ITEMS_PER_PAGE; 
      currentCategory = category;
      
      const buttons = document.querySelectorAll('#category-filters button:not([disabled])');
      buttons.forEach(btn => {
        if (btn.id === `btn-${category}`) {
          btn.className = "text-xs font-bold px-4 py-2.5 rounded-xl transition cursor-pointer bg-cyan-500 text-slate-900 shadow-md shadow-cyan-500/20";
        } else {
          btn.className = "text-xs font-bold px-4 py-2.5 rounded-xl transition cursor-pointer bg-slate-700 text-slate-300 hover:bg-slate-600";
        }
      });
      applyFilterAndSearch(); 
    }

    function handleSearch() {
      currentLimit = ITEMS_PER_PAGE; 
      searchQuery = document.getElementById('search-input').value;
      applyFilterAndSearch(); 
    }

    // 4. Manajemen Buka & Tutup Modal Baca Detail
    function openModal(index) {
      const art = globalArticles[index];
      if (!art) return;
      const fallbackImg = 'https://images.unsplash.com/photo-1518770660439-4636190af475?w=500';
      
      document.getElementById('modal-title').innerText = art.judul || 'Tanpa Judul';
      document.getElementById('modal-category').innerText = art.kategori || 'Gadget';
      document.getElementById('modal-date').innerText = art.tanggal || '';
      
      document.getElementById('modal-content').innerHTML = art.konten || ''; 
      document.getElementById('modal-img').src = art.gambar || fallbackImg;
      document.getElementById('modal-img-blur').src = art.gambar || fallbackImg;
      
      const sourceLinkElement = document.getElementById('modal-source-link');
      if (art.sumber && art.sumber !== "#" && art.sumber.trim() !== "") {
        sourceLinkElement.href = art.sumber;
        sourceLinkElement.classList.remove('hidden');
      } else {
        sourceLinkElement.classList.add('hidden'); 
      }
      
      document.getElementById('article-modal').classList.remove('hidden');
      document.body.style.overflow = 'hidden';
    }

    function closeModal() {
      document.getElementById('article-modal').classList.add('hidden');
      document.body.style.overflow = 'auto';
    }

    window.onload = loadArticles;
  </script>
</body>
</html>
